<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Sora:wght@100..800&display=swap" rel="stylesheet">
    <title>GrassIA - Gestão de Áreas Verdes</title>
</head>
<body>
    <div class="inicio">
        <h1>Grass IA</h1>
        <h2>Bem-vindo ao GrassIA</h2>
        <p>O GrassIA é uma aplicação inovadora para a gestão eficiente de áreas verdes, 
        <br/>utilizando inteligência artificial para otimizar o cuidado e manutenção dos espaços verdes urbanos.</p>
    </div>
    <div class="Cadastros">
        <h1>Cadastro Usuário</h1>
        <form id="cadastroUsuario">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Ex: João Silva" required>
            
            <label for="veiculo">Cargo:</label>
            <select>
                <option value="Roçador">Roçador</option>
                <option value="Inspetor">Inspetor</option>
                <option value="Gestor">Gestor</option>
            </select>
            
            <label for="idade">Idade:</label>
            <input type="text" id="idade" placeholder="Ex: 30" required>

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" placeholder="Ex: 123.456.789-00" required>

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Ex: joao.silva@email.com" required>

            <label for="senha">senha:</label>
            <input type="password" id="senha" placeholder="Ex: ********" required>

            <button type="submit">Registar Usuário</button>
        </form>

        <form id="cadastroVeiculo">

            <h1>Cadastro Veículo</h1>
            <label for="nome">Nome do condutor:</label>
            <input type="text" id="nome" placeholder="Ex: João Silva" required>
            
            <label for="marca">Marca do veiculo:</label>
            <input type="text" id="marca" placeholder="Ex: Ford" required>
            
            <label for="placa">Placa do Veículo:</label>
            <input type="text" id="placa" placeholder="ABC-1234" required>
            
            <button type="submit">Registar Veículo</button>
        </form>
        <img src="./assets/logoIA.png" alt="logo">

    </div>
</body>
</html>
